<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ersin | Masraf Envanteri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); border: 1px solid #334155; backdrop-filter: blur(10px); }
        .accent-cyan { background-color: #22d3ee; color: #0f172a; }
        .accent-cyan:hover { background-color: #06b6d4; transform: translateY(-1px); }
        input, select { background: #1e293b !important; border: 1px solid #475569 !important; color: white !important; }
        input:focus { border-color: #22d3ee !important; outline: none; }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-slate-400 italic">MASRAF<span class="text-cyan-400 not-italic">ENVANTERİ</span></h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Sistem Aktif | Ersin</p>
            </div>
            <div class="text-right">
                <span class="block text-[10px] text-slate-500 uppercase">Toplam Harcama</span>
                <span id="totalDisplay" class="text-2xl font-bold text-cyan-400">0.00 ₺</span>
            </div>
        </div>

        <div class="glass-card p-6 rounded-2xl mb-8 shadow-2xl border-t-2 border-t-cyan-500">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="desc" placeholder="Harcama Adı" class="p-3 rounded-lg w-full">
                <select id="cat" class="p-3 rounded-lg w-full">
                    <option value="Ofis">Ofis Gideri</option>
                    <option value="Yazılım">Yazılım/Hizmet</option>
                    <option value="Ulaşım">Ulaşım</option>
                    <option value="Diğer">Diğer</option>
                </select>
                <input type="number" id="amount" placeholder="Tutar (₺)" class="p-3 rounded-lg w-full">
            </div>
            <button onclick="addItem()" class="accent-cyan w-full mt-4 py-3 rounded-xl font-bold transition-all flex items-center justify-center gap-2">
                <i class="fas fa-plus-circle"></i> ENVANTERE EKLE
            </button>
        </div>

        <div class="glass-card rounded-2xl overflow-hidden shadow-xl">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-800/50 text-[10px] text-slate-400 uppercase tracking-wider">
                        <th class="p-4 font-medium">Tarih</th>
                        <th class="p-4 font-medium">Açıklama</th>
                        <th class="p-4 font-medium text-right">Tutar</th>
                        <th class="p-4 font-medium text-center">Sil</th>
                    </tr>
                </thead>
                <tbody id="listBody" class="text-sm">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Verileri Yükle
        let expenses = JSON.parse(localStorage.getItem('ersin_expenses')) || [];

        function addItem() {
            const descInput = document.getElementById('desc');
            const amountInput = document.getElementById('amount');
            const catInput = document.getElementById('cat');

            // Kontrol
            if (!descInput.value || !amountInput.value) {
                alert("Lütfen tüm alanları doldur!");
                return;
            }

            const newItem = {
                id: Date.now(),
                date: new Date().toLocaleDateString('tr-TR'),
                desc: descInput.value,
                cat: catInput.value,
                amount: parseFloat(amountInput.value)
            };

            // Listeye ekle ve Kaydet
            expenses.unshift(newItem);
            localStorage.setItem('ersin_expenses', JSON.stringify(expenses));
            
            // Inputları temizle
            descInput.value = '';
            amountInput.value = '';
            
            // Görünümü güncelle
            render();
        }

        function deleteItem(id) {
            expenses = expenses.filter(e => e.id !== id);
            localStorage.setItem('ersin_expenses', JSON.stringify(expenses));
            render();
        }

        function render() {
            const body = document.getElementById('listBody');
            const totalDisplay = document.getElementById('totalDisplay');
            let total = 0;
            
            body.innerHTML = '';

            expenses.forEach(e => {
                total += e.amount;
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-700/50 hover:bg-slate-700/20 transition";
                tr.innerHTML = `
                    <td class="p-4 text-slate-500 text-xs">${e.date}</td>
                    <td class="p-4">
                        <div class="font-semibold text-slate-200">${e.desc}</div>
                        <div class="text-[10px] text-cyan-500 uppercase">${e.cat}</div>
                    </td>
                    <td class="p-4 text-right font-bold text-cyan-400 text-lg">${e.amount.toLocaleString('tr-TR', {minimumFractionDigits: 2})} ₺</td>
                    <td class="p-4 text-center">
                        <button onclick="deleteItem(${e.id})" class="text-slate-600 hover:text-red-400 transition p-2">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                body.appendChild(tr);
            });

            totalDisplay.innerText = total.toLocaleString('tr-TR', {minimumFractionDigits: 2}) + ' ₺';
        }

        // Sayfa açıldığında render et
        window.onload = render;
    </script>
</body>
</html>
